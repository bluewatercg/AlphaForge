name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --name atlas-a `
            --onedir `
            --console `
            --add-data "prompts;prompts" `
            --add-data "config;config" `
            --hidden-import anthropic `
            --hidden-import akshare `
            --hidden-import pandas `
            --hidden-import numpy `
            --hidden-import jinja2 `
            --hidden-import pydantic `
            --hidden-import aiohttp `
            --hidden-import dotenv `
            --collect-all akshare `
            main.py

      - name: Create .env template
        run: |
          @"
          # ATLAS-A 配置
          # 请填入你的 API Key
          ANTHROPIC_API_KEY=your-key-here
          # LLM_MODEL=gpt-5.4
          # http_proxy=http://127.0.0.1:7890
          "@ | Out-File -Encoding utf8 dist\atlas-a\.env.example

      - name: Package as ZIP
        run: |
          Compress-Archive -Path dist\atlas-a\* -DestinationPath dist\atlas-a-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-a-windows-x64
          path: dist/atlas-a-windows-x64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/atlas-a-windows-x64.zip
          generate_release_notes: true
